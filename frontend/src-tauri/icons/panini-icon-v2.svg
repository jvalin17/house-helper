<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blue rounded background -->
  <rect width="512" height="512" rx="80" ry="80" fill="#1e3a5f"/>

  <!-- Tree trunk -->
  <path d="M256 420 L256 280" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Main branches -->
  <!-- Left main branch -->
  <path d="M256 310 Q220 280 190 240" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Right main branch -->
  <path d="M256 310 Q292 280 322 240" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Center branch -->
  <path d="M256 290 L256 200" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Secondary branches -->
  <path d="M190 240 Q170 220 150 195" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M190 240 Q195 215 210 195" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M322 240 Q317 215 302 195" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M322 240 Q342 220 362 195" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M256 200 Q240 180 225 160" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M256 200 Q272 180 287 160" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Leaf canopy clusters (organic circles) -->
  <!-- Center top -->
  <circle cx="256" cy="155" r="35" fill="white" opacity="0.95"/>
  <circle cx="235" cy="170" r="25" fill="white" opacity="0.85"/>
  <circle cx="280" cy="168" r="27" fill="white" opacity="0.85"/>
  <circle cx="256" cy="130" r="28" fill="white" opacity="0.9"/>

  <!-- Left canopy -->
  <circle cx="170" cy="190" r="30" fill="white" opacity="0.9"/>
  <circle cx="145" cy="175" r="25" fill="white" opacity="0.85"/>
  <circle cx="195" cy="178" r="22" fill="white" opacity="0.8"/>
  <circle cx="155" cy="155" r="20" fill="white" opacity="0.75"/>

  <!-- Right canopy -->
  <circle cx="342" cy="190" r="30" fill="white" opacity="0.9"/>
  <circle cx="367" cy="175" r="25" fill="white" opacity="0.85"/>
  <circle cx="317" cy="178" r="22" fill="white" opacity="0.8"/>
  <circle cx="357" cy="155" r="20" fill="white" opacity="0.75"/>

  <!-- Top fill -->
  <circle cx="210" cy="145" r="18" fill="white" opacity="0.7"/>
  <circle cx="300" cy="145" r="18" fill="white" opacity="0.7"/>
  <circle cx="256" cy="105" r="20" fill="white" opacity="0.7"/>

  <!-- Small roots at base -->
  <path d="M256 420 Q240 430 220 435" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M256 420 Q272 430 292 435" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- "पाणिनि" (Panini in Sanskrit/Devanagari) in green -->
  <text x="256" y="480" text-anchor="middle" fill="#22c55e" font-family="serif" font-size="48" font-weight="700" letter-spacing="4">पाणिनि</text>
</svg>
