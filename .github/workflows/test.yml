name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (WeasyPrint)
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install fastapi uvicorn python-dotenv httpx anthropic openai
          pip install rapidfuzz python-docx pdfplumber python-multipart
          pip install reportlab "numpy<2" "transformers<5"
          pip install pyjwt bcrypt cryptography
          pip install markdown beautifulsoup4 trafilatura weasyprint PyMuPDF

      - name: Run backend tests
        run: python -m pytest tests/ -q -m "not network and not live" --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -b

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

      - name: Build check
        working-directory: frontend
        run: npm run build

  readme-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README links
        run: |
          echo "Checking links in README.md..."
          FAILED=0

          # Extract markdown links [text](url) — skip anchors and relative paths
          grep -oP '\[.*?\]\(\K(https?://[^)]+)' README.md | sort -u | while read -r url; do
            # Skip known-flaky or rate-limited domains
            case "$url" in
              *rapidapi.com*|*x.ai*) echo "  SKIP $url (rate-limited)"; continue ;;
            esac

            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
            if [ "$STATUS" -ge 400 ] || [ "$STATUS" = "000" ]; then
              echo "  FAIL [$STATUS] $url"
              FAILED=1
            else
              echo "  OK   [$STATUS] $url"
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Some links are broken. Fix them before merging."
            exit 1
          fi
          echo "All links OK."
