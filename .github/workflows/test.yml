name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (WeasyPrint)
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install fastapi uvicorn python-dotenv httpx anthropic openai
          pip install rapidfuzz python-docx pdfplumber python-multipart
          pip install reportlab "numpy<2" "transformers<5"
          pip install pyjwt bcrypt cryptography
          pip install markdown beautifulsoup4 trafilatura weasyprint PyMuPDF

      - name: Run backend tests
        run: python -m pytest tests/ -q -m "not network and not live" --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -b

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

      - name: Build check
        working-directory: frontend
        run: npm run build
