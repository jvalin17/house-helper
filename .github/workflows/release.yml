name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pyinstaller-args: "--target-architecture arm64"
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pyinstaller-args: ""
            bundle: msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            pyinstaller-args: ""
            bundle: deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── Python + Backend Binary ──────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies (no torch — saves 2GB disk)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
          pip install fastapi uvicorn python-dotenv httpx anthropic openai
          pip install rapidfuzz python-docx python-multipart
          pip install markdown beautifulsoup4 trafilatura weasyprint PyMuPDF
          pip install pyjwt bcrypt cryptography
          # NOTE: sentence-transformers + torch excluded from release builds
          # (2GB+ — causes "no space left" on CI runners)
          # App falls back to TF-IDF matching without it. Users can pip install locally.

      - name: Build backend binary
        run: pyinstaller --onefile --name panini-backend ${{ matrix.pyinstaller-args }} --clean backend/main.py

      - name: Place backend binary for Tauri
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/panini-backend.exe "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}.exe"
          else
            cp dist/panini-backend "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}"
            chmod +x "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}"
          fi

      # ── Node + Rust + Tauri Build ──────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Generate proper ICO for Windows
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npx --yes png-to-ico src-tauri/icons/icon.png > src-tauri/icons/icon.ico

      - name: Build Tauri app (signed for auto-update)
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          compression-level: 0
          path: frontend/src-tauri/target/release/bundle/${{ matrix.bundle }}/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: true

      - name: Generate updater manifest (latest.json)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER=$(jq -r '.version' frontend/src-tauri/tauri.conf.json)
          BASE="https://github.com/jvalin17/house-helper/releases/download/${TAG}"

          # Read signatures if they exist (generated when TAURI_SIGNING_PRIVATE_KEY is set)
          SIG_MAC_ARM=$(cat artifacts/Panini_${VER}_aarch64.dmg.sig 2>/dev/null || echo "")
          SIG_MAC_X64=$(cat artifacts/Panini_${VER}_x64.dmg.sig 2>/dev/null || echo "")
          SIG_WIN=$(cat artifacts/Panini_${VER}_x64_en-US.msi.sig 2>/dev/null || echo "")
          SIG_LINUX=$(cat artifacts/panini_${VER}_amd64.deb.sig 2>/dev/null || echo "")

          cat > artifacts/latest.json << MANIFEST
          {
            "version": "${TAG}",
            "notes": "Update to ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/Panini_${VER}_aarch64.dmg",
                "signature": "${SIG_MAC_ARM}"
              },
              "darwin-x86_64": {
                "url": "${BASE}/Panini_${VER}_x64.dmg",
                "signature": "${SIG_MAC_X64}"
              },
              "windows-x86_64": {
                "url": "${BASE}/Panini_${VER}_x64_en-US.msi",
                "signature": "${SIG_WIN}"
              },
              "linux-x86_64": {
                "url": "${BASE}/panini_${VER}_amd64.deb",
                "signature": "${SIG_LINUX}"
              }
            }
          }
          MANIFEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.sig
            artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
