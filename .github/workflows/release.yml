name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pyinstaller-args: "--target-architecture arm64"
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pyinstaller-args: ""
            bundle: msi

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── Python + Backend Binary ──────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
          pip install fastapi uvicorn python-dotenv httpx anthropic openai
          pip install rapidfuzz python-docx python-multipart
          pip install "numpy<2" "transformers<5" "sentence-transformers<5"
          pip install markdown beautifulsoup4 trafilatura weasyprint PyMuPDF
          pip install pyjwt bcrypt cryptography

      - name: Build backend binary
        run: pyinstaller --onefile --name panini-backend ${{ matrix.pyinstaller-args }} --clean backend/main.py

      - name: Place backend binary for Tauri
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/panini-backend.exe "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}.exe"
          else
            cp dist/panini-backend "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}"
            chmod +x "frontend/src-tauri/binaries/panini-backend-${{ matrix.target }}"
          fi

      # ── Node + Rust + Tauri Build ──────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Generate proper ICO for Windows
        if: runner.os == 'Windows'
        working-directory: frontend
        run: npx --yes png-to-ico src-tauri/icons/icon.png > src-tauri/icons/icon.ico

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          compression-level: 0
          path: frontend/src-tauri/target/release/bundle/${{ matrix.bundle }}/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
